<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Gallery</title>
  <style>
    :root {
      --bg: #101216;
      --panel: #171a21;
      --text: #f3f6ff;
      --muted: #a3adc2;
      --accent: #7dd3fc;
      --accent-2: #22d3ee;
      --border: #2a3142;
      --shadow: 0 16px 40px rgba(0, 0, 0, 0.5);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(1200px 700px at 20% 0%, #1a2336 0%, var(--bg) 55%);
      color: var(--text);
      font-family: "Comic Sans MS", "Chalkboard SE", "Marker Felt", cursive;
      padding: 24px;
    }

    .gallery {
      width: min(900px, 100%);
      background: linear-gradient(180deg, #1b2030 0%, var(--panel) 100%);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .title {
      margin: 0 0 12px;
      font-size: clamp(1.3rem, 2.2vw, 2rem);
      letter-spacing: 0.02em;
      text-align: center;
    }

    .carousel {
      position: relative;
      overflow: hidden;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: #0d1016;
    }

    .track {
      display: flex;
      transition: transform 300ms ease;
      will-change: transform;
    }

    .slide {
      min-width: 100%;
      padding: 10px;
      display: grid;
      place-items: center;
    }

    .slide img {
      width: 100%;
      max-height: min(65vh, 560px);
      object-fit: contain;
      border-radius: 18px;
      border: 3px solid rgba(255, 255, 255, 0.28);
      box-shadow: 0 16px 34px rgba(0, 0, 0, 0.55);
      background: #0b0e14;
    }

    .controls {
      margin-top: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      border: 1px solid var(--border);
      color: var(--text);
      background: linear-gradient(180deg, #20283a, #161c2a);
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      font: inherit;
      transition: transform 120ms ease, border-color 120ms ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      border-color: var(--accent);
    }

    .dots {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-inline: auto;
    }

    .dot {
      width: 11px;
      height: 11px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #283146;
      cursor: pointer;
      transition: transform 120ms ease, background 120ms ease;
    }

    .dot.active {
      background: linear-gradient(180deg, var(--accent), var(--accent-2));
      transform: scale(1.15);
      border-color: transparent;
    }

    .status {
      color: var(--muted);
      min-width: 70px;
      text-align: right;
      font-size: 0.95rem;
    }
  </style>
</head>

    <div class="controls">
      <button class="btn" id="prev" aria-label="Previous image">Previous</button>
      <div class="dots" id="dots" aria-label="Slide indicators"></div>
      <button class="btn" id="next" aria-label="Next image">Next</button>
      <div class="status" id="status">1 / 3</div>
    </div>
  </section>

  <script>
    const track = document.getElementById('track');
    const slides = Array.from(document.querySelectorAll('.slide'));
    const dotsWrap = document.getElementById('dots');
    const status = document.getElementById('status');
    const prevBtn = document.getElementById('prev');
    const nextBtn = document.getElementById('next');

    let index = 0;

    slides.forEach((_, i) => {
      const dot = document.createElement('button');
      dot.className = 'dot' + (i === 0 ? ' active' : '');
      dot.type = 'button';
      dot.setAttribute('aria-label', `Go to slide ${i + 1}`);
      dot.addEventListener('click', () => goTo(i));
      dotsWrap.appendChild(dot);
    });

    const dots = Array.from(document.querySelectorAll('.dot'));

    function render() {
      track.style.transform = `translateX(-${index * 100}%)`;
      dots.forEach((dot, i) => dot.classList.toggle('active', i === index));
      status.textContent = `${index + 1} / ${slides.length}`;
    }

    function goTo(i) {
      index = (i + slides.length) % slides.length;
      render();
    }

    prevBtn.addEventListener('click', () => goTo(index - 1));
    nextBtn.addEventListener('click', () => goTo(index + 1));

    window.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') goTo(index - 1);
      if (e.key === 'ArrowRight') goTo(index + 1);
    });

    render();
  </script>
